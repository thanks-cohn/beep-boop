name: Deadman Switch 2

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "date.txt"

  schedule:
    # Runs daily at 6:00 AM UTC
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  deadman-switch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Switch index and mobile pages
        shell: bash
        run: |
          set -euo pipefail

          TZ="America/Chicago"

          REQUIRED_FILES=(
            "date.txt"
            "placeholder.html"
            "reveal.html"
            "index.html"
            "mobile.html"
          )

          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done

          CHECKIN_DATE="$(tr -d '[:space:]' < date.txt)"
          CURRENT_DATE="$(TZ="$TZ" date +%F)"

          echo "Current date: $CURRENT_DATE"
          echo "Check-in date: $CHECKIN_DATE"

          CHECKIN_SECONDS="$(date -d "$CHECKIN_DATE" +%s)"
          CURRENT_SECONDS="$(TZ="$TZ" date -d "$CURRENT_DATE" +%s)"

          DAYS_SINCE_CHECKIN=$(
            (CURRENT_SECONDS - CHECKIN_SECONDS) / 86400
          )

          echo "Days since check-in: $DAYS_SINCE_CHECKIN"

          if [ "$DAYS_SINCE_CHECKIN" -le 2 ]; then
            echo "Deadman switch safe. Using placeholder.html."
            cp placeholder.html index.html
            cp placeholder.html mobile.html
          else
            echo "Deadman switch expired. Using reveal.html."
            cp reveal.html index.html
            cp reveal.html mobile.html
          fi

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- index.html mobile.html; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add index.html mobile.html
          git commit -m "Run deadman switch page update"
          git push
